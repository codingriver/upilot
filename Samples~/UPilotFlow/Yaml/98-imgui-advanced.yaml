schemaVersion: 2
name: "98-imgui-advanced"
description: |
  Advanced IMGUI automation tests covering wait with timeout,
  scroll with custom delta, focus-then-type workflow, and
  assert_value on various control types.

fixture:
  host_window:
    type: CodingRiver.UPilot.Flow.Examples.ImguiExampleWindow
    reopen_if_open: true

setup:
  - name: Open IMGUI example window
    action: execute_command
    command: "UPilot/Flow/Examples/IMGUI Example Window"

steps:
  - name: Wait for window controls with short timeout
    action: imgui_wait
    selector: "gui(button, text=\"Generate\")"
    timeout: "3s"

  - name: Focus text field via imgui_focus
    action: imgui_focus
    selector: "gui(textfield, control_name=\"project-name-field\")"

  - name: Type without explicit selector click (focus should hold)
    action: imgui_type
    selector: "gui(textfield, control_name=\"project-name-field\")"
    text: "FocusFlowTest"

  - name: Assert text was entered
    action: imgui_assert_text
    selector: "gui(label, control_name=\"status-label\")"
    text: "Status: Ready"

  - name: Click Generate to update status
    action: imgui_click
    selector: "gui(button, text=\"Generate\")"

  - name: Assert generated status contains project name
    action: imgui_assert_text
    selector: "gui(label, control_name=\"status-label\")"
    text: "Status: Generated: FocusFlowTest, Quality=Low, Scale=1.00, DoubleClicks=0"

  - name: Assert Generate button value
    action: imgui_assert_value
    selector: "gui(button, text=\"Generate\")"
    expected: "Generate"

  - name: Assert Reset button value
    action: imgui_assert_value
    selector: "gui(button, text=\"Reset\")"
    expected: "Reset"

  - name: Scroll down in log area
    action: imgui_scroll
    selector: "gui(label, text=\"Log Output\")"
    delta: -360

  - name: Scroll up in log area
    action: imgui_scroll
    selector: "gui(label, text=\"Log Output\")"
    delta: 180

  - name: Click slider to change value (best-effort)
    action: imgui_click
    selector: "gui(slider, control_name=\"scale-slider\")"

  - name: Toggle feature on
    action: imgui_click
    selector: "gui(toggle, control_name=\"feature-toggle\")"

  - name: Assert toggle value (unknown due to IMGUI limitations)
    action: imgui_assert_value
    selector: "gui(toggle, control_name=\"feature-toggle\")"
    expected: "unknown"

  - name: Select Ultra quality
    action: imgui_select_option
    selector: "gui(dropdown, control_name=\"quality-popup\")"
    index: 3
    field_name: "_qualityIndex"

  - name: Read quality into bag
    action: imgui_read_value
    selector: "gui(dropdown, control_name=\"quality-popup\")"
    bag_key: "advanced_quality"

  - name: Double click Reset
    action: imgui_double_click
    selector: "gui(button, text=\"Reset\")"

  - name: Assert reset status
    action: imgui_assert_text
    selector: "gui(label, control_name=\"status-label\")"
    text: "Status: Reset"

  - name: Hover over Generate
    action: imgui_hover
    selector: "gui(button, text=\"Generate\")"

  - name: Hover over text field
    action: imgui_hover
    selector: "gui(textfield, control_name=\"project-name-field\")"

  - name: Focus text field
    action: imgui_focus
    selector: "gui(textfield, control_name=\"project-name-field\")"

  - name: Type some text
    action: imgui_type
    selector: "gui(textfield, control_name=\"project-name-field\")"
    text: "KeyboardTest"

  - name: Select all
    action: imgui_press_key_combination
    keys: "Ctrl+A"

  - name: Delete selection
    action: imgui_press_key
    key: Delete

  - name: Assert field is empty (status should still show Reset)
    action: imgui_assert_text
    selector: "gui(label, control_name=\"status-label\")"
    text: "Status: Reset"

  - name: Final screenshot
    action: screenshot
    tag: "imgui_advanced_final"
