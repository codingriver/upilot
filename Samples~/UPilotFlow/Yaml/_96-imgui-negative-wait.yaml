schemaVersion: 2
name: "_96-imgui-negative-wait"
description: |
  Negative test: verifies that imgui_wait times out correctly
  when the target element does not exist.
  This test is expected to FAIL with a timeout error.

fixture:
  host_window:
    type: CodingRiver.UPilot.Flow.Examples.ImguiExampleWindow
    reopen_if_open: true

setup:
  - name: Open IMGUI example window
    action: execute_command
    command: "UPilot/Flow/Examples/IMGUI Example Window"

steps:
  - name: Wait for a non-existent element (should timeout)
    action: imgui_wait
    selector: "gui(button, text=\"ThisButtonDoesNotExist\")"
    timeout: "2s"
