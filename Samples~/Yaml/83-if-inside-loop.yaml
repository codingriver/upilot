name: "83-if-inside-loop"
description: |
  Tests if condition combined with repeat_while, where conditional steps
  execute inside a loop body.

fixture:
  host_window:
    type: UnityUIFlow.Examples.ExampleBasicLoginWindow
    reopen_if_open: true

steps:
  - name: Loop with conditional steps
    repeat_while:
      condition:
        not_exists: "#nonexistent-element"
      max_iterations: 2
      steps:
        - name: Click login button if it exists
          action: click
          selector: "#login-button"
          if:
            exists: "#login-button"

        - name: Assert status after conditional click
          action: assert_text_contains
          selector: "#status-label"
          expected: "Missing credentials"

        - name: Brief wait
          action: wait
          duration: "50ms"

  - name: Assert window still functional after loop
    action: assert_visible
    selector: "#login-button"
