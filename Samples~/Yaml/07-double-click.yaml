name: "07-double-click"
description: Covers the double_click action.
fixture:
  host_window:
    type: codingriver.upilot.UIFlow.Examples.ExampleDoubleClickWindow
    reopen_if_open: true
steps:
  - name: Double click target
    action: double_click
    selector: "#double-button"
  - name: Assert click count
    action: assert_text
    selector: "#double-status"
    expected: "Double Count: 4"
