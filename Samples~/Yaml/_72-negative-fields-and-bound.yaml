name: "_72-negative-fields-and-bound"
description: |
  Verifies that set_bound_value fails when applied to a non-bound element.
  This test is expected to FAIL.

fixture:
  host_window:
    type: UnityUIFlow.Examples.ExampleCoverageFieldsWindow
    reopen_if_open: true

steps:
  - name: set_bound_value on unbound toggle should fail
    action: set_bound_value
    selector: "#enabled-toggle"
    binding_path: "enabled"
    value: "true"
