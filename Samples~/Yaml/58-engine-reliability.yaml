name: "58-engine-reliability"
fixture:
  host_window:
    type: UnityUIFlow.Examples.ExampleCsvLoginWindow
    reopen_if_open: true
  setup:
    - action: type_text_fast
      selector: '#username-input'
      value: 'combo-user'
  teardown:
    - action: click
      selector: '#reset-button'
data:
  rows:
    - role: admin
    - role: guest
steps:
  - action: assert_text
    selector: '#status-label'
    expected: 'Idle'
  - action: type_text_fast
    selector: '#username-input'
    value: '{{ role }}'
  - action: click
    selector: '#login-button'
  - action: assert_text_contains
    selector: '#status-label'
    expected: '{{ role }}'
  - action: click
    selector: '#reset-button'
  - name: Conditional step for admin
    action: assert_text
    selector: '#status-label'
    expected: 'Idle'
    if:
      exists: '#login-button'
