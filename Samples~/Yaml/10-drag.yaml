name: "10-drag"
description: Covers the drag action.
fixture:
  host_window:
    type: UnityUIFlow.Examples.ExampleDragWindow
    reopen_if_open: true
steps:
  - name: Drag on surface
    action: drag
    from: "10,10"
    to: "120,120"
    duration: "64ms"
  - name: Assert drag state
    action: assert_text
    selector: "#drag-status"
    expected: "Drag: completed"
