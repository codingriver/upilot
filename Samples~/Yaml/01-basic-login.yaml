name: "01-basic-login"
description: Covers type_text, click, assert_text_contains and screenshot.
fixture:
  host_window:
    type: UnityUIFlow.Examples.ExampleBasicLoginWindow
    reopen_if_open: true
steps:
  - name: Fill username
    action: type_text
    selector: "#username-input"
    value: "alice"
  - name: Fill password
    action: type_text
    selector: "#password-input"
    value: "secret"
  - name: Submit login
    action: click
    selector: "#login-button"
  - name: Assert welcome text
    action: assert_text_contains
    selector: "#status-label"
    expected: "alice"
  - name: Capture evidence
    action: screenshot
    tag: "basic-login"
