name: "96-property-field-nested"
description: Covers set_bound_value and assert_bound_value on PropertyField and InspectorElement with nested binding paths.
fixture:
  host_window:
    type: ExampleCoverageFieldsWindow
    reopen_if_open: true
steps:
  - action: set_bound_value
    selector: "#property-title-field"
    property: "title"
    value: "Nested Title"

  - action: assert_bound_value
    selector: "#property-title-field"
    property: "title"
    expected: "Nested Title"

  - action: set_bound_value
    selector: "#settings-inspector"
    property: "count"
    value: "42"

  - action: assert_bound_value
    selector: "#settings-inspector"
    property: "count"
    expected: "42"

  - action: set_bound_value
    selector: "#settings-inspector"
    property: "enabled"
    value: "false"

  - action: assert_bound_value
    selector: "#settings-inspector"
    property: "enabled"
    expected: "false"
