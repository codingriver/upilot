name: "109-empty-string-values"
description: Covers set_value, type_text, assert_value and assert_text with empty strings.
fixture:
  host_window:
    type: ExampleBasicLoginWindow
    reopen_if_open: true
steps:
  - name: Set empty username
    action: set_value
    selector: "#username-input"
    value: ""
  - name: Assert empty value
    action: assert_value
    selector: "#username-input"
    expected: ""
  - name: Type empty text
    action: type_text
    selector: "#username-input"
    value: ""
  - name: Assert empty text
    action: assert_text
    selector: "#username-input"
    expected: ""
