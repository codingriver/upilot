name: "03-wait-for-element"
description: Covers delayed appearance and wait_for_element.
fixture:
  host_window:
    type: UnityUIFlow.Examples.ExampleWaitForElementWindow
    reopen_if_open: true
steps:
  - name: Start delayed reveal
    action: click
    selector: "#start-button"
  - name: Wait for message
    action: wait_for_element
    selector: "#delayed-message"
    timeout: "2s"
  - name: Assert final message
    action: assert_text
    selector: "#delayed-message"
    expected: "Ready"
