name: "04-conditional-and-loop"
description: Covers if.exists, repeat_while, wait and assert_not_visible.
fixture:
  host_window:
    type: UnityUIFlow.Examples.ExampleConditionalLoopWindow
    reopen_if_open: true
steps:
  - name: Save when button exists
    action: click
    selector: "#save-button"
    if:
      exists: "#save-button"
  - name: Toast appears
    action: assert_visible
    selector: "#toast-message"
    timeout: "1s"
  - name: Wait until toast removed
    repeat_while:
      condition:
        exists: "#toast-message"
      max_iterations: 40
      steps:
        - name: Wait a frame chunk
          action: wait
          duration: "50ms"
  - name: Toast no longer visible
    action: assert_not_visible
    selector: "#toast-message"
    timeout: "500ms"
