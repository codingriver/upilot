name: "67-menu-item-aliases"
description: |
  Tests alias parameters for menu actions:
  menu_item with menu (alias for mode) and value (alias for item),
  assert_menu_item with value alias, select_context_menu_item with value alias.

fixture:
  host_window:
    type: UnityUIFlow.Examples.ExampleCoverageInputWindow
    reopen_if_open: true

steps:
  - name: Open toolbar menu via menu_item with menu alias for mode
    action: menu_item
    selector: "#toolbar-menu"
    value: "Refresh"
    menu: "select"

  - name: Assert menu action fired
    action: assert_text
    selector: "#toolbar-status"
    expected: "Toolbar: refresh"

  - name: Assert menu item enabled using value alias
    action: assert_menu_item
    selector: "#toolbar-menu"
    value: "Reset"

  - name: Select toolbar menu item using select_context_menu_item value alias
    action: select_context_menu_item
    selector: "#toolbar-menu"
    value: "Reset"

  - name: Assert toolbar menu action fired via select_context_menu_item
    action: assert_text
    selector: "#toolbar-status"
    expected: "Toolbar: reset"

  - name: Assert disabled menu item using value alias
    action: assert_menu_item_disabled
    selector: "#toolbar-menu"
    value: "Disabled"
