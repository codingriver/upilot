name: "97-set-value-numeric-variants"
description: Covers set_value and assert_value on unsigned integer/long, VectorInt, RectInt, BoundsInt and Bounds fields.
fixture:
  host_window:
    type: ExampleCoverageFieldsWindow
    reopen_if_open: true
steps:
  - action: set_value
    selector: "#max-items"
    value: "100"
  - action: assert_value
    selector: "#max-items"
    expected: "100"

  - action: set_value
    selector: "#total-bytes"
    value: "999"
  - action: assert_value
    selector: "#total-bytes"
    expected: "999"

  - action: set_value
    selector: "#cell-vector2int"
    value: "10,20"
  - action: assert_value
    selector: "#cell-vector2int"
    expected: "10,20"

  - action: set_value
    selector: "#grid-position-vector3int"
    value: "1,2,3"
  - action: assert_value
    selector: "#grid-position-vector3int"
    expected: "1,2,3"

  - action: set_value
    selector: "#grid-rectint"
    value: "0,0,10,10"
  - action: assert_value
    selector: "#grid-rectint"
    expected: "0,0,10,10"

  - action: set_value
    selector: "#voxel-boundsint"
    value: "0,0,0,1,1,1"
  - action: assert_value
    selector: "#voxel-boundsint"
    expected: "0,0,0,1,1,1"

  - action: set_value
    selector: "#volume-bounds"
    value: "0,0,0,0.5,0.5,0.5"
  - action: assert_value
    selector: "#volume-bounds"
    expected: "0,0,0,0.5,0.5,0.5"
