name: "94-full-action-regression"
description: |
  Quick smoke test covering the most commonly used UIToolkit actions
  in a single flow. Designed for fast CI validation of core automation
  capabilities.

fixture:
  host_window:
    type: UnityUIFlow.Examples.ExampleBasicLoginWindow
    reopen_if_open: true

steps:
  - name: Enter username
    action: type_text
    selector: "#username-input"
    value: "regression_user"

  - name: Enter password
    action: type_text_fast
    selector: "#password-input"
    value: "regression_pass"

  - name: Click login
    action: click
    selector: "#login-button"

  - name: Assert welcome message for regression user
    action: assert_text
    selector: "#status-label"
    expected: "Welcome regression_user"

  - name: Assert login button is visible
    action: assert_visible
    selector: "#login-button"

  - name: Focus username
    action: focus
    selector: "#username-input"

  - name: Select all and delete
    action: press_key_combination
    keys: "Ctrl+A"

  - name: Type replacement
    action: type_text
    selector: "#username-input"
    value: "admin"

  - name: Focus password
    action: focus
    selector: "#password-input"

  - name: Clear password
    action: press_key_combination
    keys: "Ctrl+A"

  - name: Type new password
    action: type_text_fast
    selector: "#password-input"
    value: "admin123"

  - name: Click login again
    action: click
    selector: "#login-button"

  - name: Assert welcome message
    action: assert_text_contains
    selector: "#status-label"
    expected: "Welcome"

  - name: Wait briefly
    action: wait
    duration: "500ms"

  - name: Capture final state
    action: screenshot
    tag: "regression_final"
