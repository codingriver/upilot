name: "15-fields-complex"
fixture:
  host_window:
    type: UnityUIFlow.Examples.ExampleCoverageFieldsWindow
    reopen_if_open: true
steps:
  - action: set_value
    selector: "#max-items"
    value: "42"
  - action: set_value
    selector: "#total-bytes"
    value: "4200"
  - action: set_value
    selector: "#accent-color"
    value: "#FF8040CC"
  - action: set_value
    selector: "#anchor-vector2"
    value: "9.5,8.5"
  - action: set_value
    selector: "#cell-vector2int"
    value: "7,6"
  - action: set_value
    selector: "#offset-vector3"
    value: "1.5,2.5,3.5"
  - action: set_value
    selector: "#quaternion-vector4"
    value: "1,2,3,4"
  - action: set_value
    selector: "#viewport-rect"
    value: "5,6,120,80"
  - action: set_value
    selector: "#grid-rectint"
    value: "2,3,40,50"
  - action: set_value
    selector: "#volume-bounds"
    value: "1,2,3,4,5,6"
  - action: set_value
    selector: "#voxel-boundsint"
    value: "3,4,5,6,7,8"
  - action: set_value
    selector: "#content-hash"
    value: "11111111222222223333333344444444"
  - action: set_value
    selector: "#template-asset"
    value: "path:Assets/Examples/Uxml/SampleInteractionWindow.uxml"
  - action: set_value
    selector: "#speed-curve"
    value: "0:0:1:1;1:2:0:0"
  - action: set_value
    selector: "#ramp-gradient"
    value: "0:#FF0000FF;1:#00FF00FF|0:1;1:0.5"
  - action: assert_value
    selector: "#accent-color"
    expected: "#FF8040CC"
  - action: assert_value
    selector: "#anchor-vector2"
    expected: "9.5,8.5"
  - action: assert_value
    selector: "#offset-vector3"
    expected: "1.5,2.5,3.5"
  - action: assert_value
    selector: "#template-asset"
    expected: "Assets/Examples/Uxml/SampleInteractionWindow.uxml"
