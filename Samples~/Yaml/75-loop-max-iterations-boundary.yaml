name: "75-loop-max-iterations-boundary"
description: |
  Tests repeat_while with a small max_iterations boundary to ensure
  the loop exits correctly without running indefinitely.

fixture:
  host_window:
    type: UnityUIFlow.Examples.ExampleBasicLoginWindow
    reopen_if_open: true

steps:
  - name: Click login to trigger status update
    action: click
    selector: "#login-button"

  - name: Assert status shows missing credentials
    action: assert_text_contains
    selector: "#status-label"
    expected: "Missing credentials"

  - name: Loop with max_iterations boundary on non-existent element
    repeat_while:
      condition:
        exists: "#never-exists"
      max_iterations: 3
      steps:
        - name: Wait briefly
          action: wait
          duration: "50ms"

  - name: Assert loop exited and login button still visible
    action: assert_visible
    selector: "#login-button"
