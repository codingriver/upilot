name: "88-objectfield-strategies-extended"
description: |
  Tests additional set_value search strategies on ObjectField:
  path, asset-name, and guid variants.

fixture:
  host_window:
    type: UnityUIFlow.Examples.ExampleCoverageFieldsWindow
    reopen_if_open: true

steps:
  - name: Set ObjectField by explicit path
    action: set_value
    selector: "#template-asset"
    value: "path:Assets/Examples/Uxml/SampleInteractionWindow.uxml"

  - name: Assert ObjectField resolved by path
    action: assert_value
    selector: "#template-asset"
    expected: "Assets/Examples/Uxml/SampleInteractionWindow.uxml"

  - name: Set ObjectField by asset-name
    action: set_value
    selector: "#template-asset"
    value: "asset-name:SampleInteractionWindow"

  - name: Assert ObjectField resolved by asset-name
    action: assert_value
    selector: "#template-asset"
    expected: "Assets/Examples/Uxml/SampleInteractionWindow.uxml"
