name: "68-drag-and-scroll-modifiers"
description: |
  Tests modifier and alternate button parameters for drag and scroll actions:
  double_click with modifiers, drag with button and modifiers,
  open_context_menu with modifiers.

fixture:
  host_window:
    type: UnityUIFlow.Examples.ExampleCoverageInputWindow
    reopen_if_open: true

steps:
  - name: Double click with shift modifier
    action: double_click
    selector: "#gesture-double-target"
    modifiers: "shift"

  - name: Assert double click registered
    action: assert_text_contains
    selector: "#gesture-status"
    expected: "Double: 2"

  - name: Drag with right button and shift modifier
    action: drag
    from: "#gesture-drag-target"
    to: "#gesture-hover-target"
    button: 1
    modifiers: "shift"

  - name: Assert drag with right button and shift
    action: assert_text_contains
    selector: "#gesture-status"
    expected: "button=1"

  - name: Open context menu with ctrl modifier
    action: open_context_menu
    selector: "#context-target"
    modifiers: "ctrl"

  - name: Dismiss context menu with Escape
    action: press_key
    key: Escape

  - name: Assert context menu was opened and dismissed
    action: assert_text_contains
    selector: "#command-status"
    expected: "Command: idle"
