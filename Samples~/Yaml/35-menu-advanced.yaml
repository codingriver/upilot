name: "35-menu-advanced"
description: Covers open_popup_menu, select_popup_menu_item, assert_menu_item, assert_menu_item_disabled, open_context_menu, select_context_menu_item.
fixture:
  host_window:
    type: UnityUIFlow.Examples.ExampleCoverageInputWindow
    reopen_if_open: true
steps:
  - name: Open toolbar popup menu
    action: open_popup_menu
    selector: "#toolbar-menu"
  - name: Assert enabled menu item in popup
    action: assert_menu_item
    selector: "#toolbar-menu"
    item: "Refresh"
  - name: Assert disabled menu item in popup
    action: assert_menu_item_disabled
    selector: "#toolbar-menu"
    item: "Disabled"
  - name: Select popup menu item
    action: select_popup_menu_item
    selector: "#toolbar-menu"
    item: "Refresh"
  - name: Assert popup selection result
    action: assert_text
    selector: "#toolbar-status"
    expected: "Toolbar: refresh"
  - name: Open context menu
    action: open_context_menu
    selector: "#context-target"
  - name: Assert enabled context menu item
    action: assert_menu_item
    item: "Copy"
  - name: Assert disabled context menu item
    action: assert_menu_item_disabled
    item: "Paste"
  - name: Select context menu item
    action: select_context_menu_item
    item: "Copy"
  - name: Assert context menu selection result
    action: assert_text
    selector: "#command-status"
    expected: "Context: Copy"
