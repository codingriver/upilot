name: "11-scroll"
description: Covers the scroll action.
fixture:
  host_window:
    type: UnityUIFlow.Examples.ExampleScrollWindow
    reopen_if_open: true
steps:
  - name: Scroll list
    action: scroll
    selector: "#scroll-view"
    delta: "0,160"
  - name: Allow status update
    action: wait
    duration: "50ms"
  - name: Assert scroll amount
    action: assert_text_contains
    selector: "#scroll-status"
    expected: "160"
