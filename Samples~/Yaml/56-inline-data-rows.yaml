name: "56-inline-data-rows"
fixture:
  host_window:
    type: UnityUIFlow.Examples.ExampleBasicLoginWindow
    reopen_if_open: true
data:
  rows:
    - username: "alice"
      password: "wonderland"
    - username: "bob"
      password: "builder"
steps:
  - action: type_text_fast
    selector: "#username-input"
    value: "{{ username }}"
  - action: type_text_fast
    selector: "#password-input"
    value: "{{ password }}"
  - action: click
    selector: "#login-button"
  - action: assert_text_contains
    selector: "#status-label"
    expected: "Welcome {{ username }}"
