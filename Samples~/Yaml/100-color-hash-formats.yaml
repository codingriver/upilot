name: "100-color-hash-formats"
description: Covers ColorField with multiple formats and Hash128Field with different lengths.
fixture:
  host_window:
    type: ExampleCoverageFieldsWindow
    reopen_if_open: true
steps:
  - action: set_value
    selector: "#accent-color"
    value: "#FF0000FF"
  - action: assert_value
    selector: "#accent-color"
    expected: "#FF0000FF"

  - action: set_value
    selector: "#accent-color"
    value: "0,1,0,1"
  - action: assert_value
    selector: "#accent-color"
    expected: "#00FF00FF"

  - action: set_value
    selector: "#content-hash"
    value: "1234567890abcdef1234567890abcdef"
  - action: assert_value
    selector: "#content-hash"
    expected: "1234567890abcdef1234567890abcdef"

  - action: set_value
    selector: "#content-hash"
    value: "00000000000000000000000000000000"
  - action: assert_value
    selector: "#content-hash"
    expected: "00000000000000000000000000000000"
