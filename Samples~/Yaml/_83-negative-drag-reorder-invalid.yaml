name: "_83-negative-drag-reorder-invalid"
description: |
  Verifies that drag_reorder fails when given an invalid index.
  This test is expected to FAIL.

fixture:
  host_window:
    type: UnityUIFlow.Examples.ExampleCoverageCollectionsWindow
    reopen_if_open: true

steps:
  - name: drag_reorder with invalid index should fail
    action: drag_reorder
    selector: "#item-list"
    index: "999"
