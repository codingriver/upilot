name: "_71-negative-advanced-not-found"
description: |
  Verifies that select_tree_item fails when given an invalid id.
  This test is expected to FAIL.

fixture:
  host_window:
    type: UnityUIFlow.Examples.ExampleCoverageCollectionsWindow
    reopen_if_open: true

steps:
  - name: Select tree item with invalid id should fail
    action: select_tree_item
    selector: "#navigation-tree"
    id: "99999"
