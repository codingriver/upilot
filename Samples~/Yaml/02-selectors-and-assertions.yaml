name: "02-selectors-and-assertions"
description: Covers selector forms, assert_visible, assert_property and assert_text.
fixture:
  host_window:
    type: UnityUIFlow.Examples.ExampleSelectorsWindow
    reopen_if_open: true
steps:
  - name: Match child selector
    action: assert_visible
    selector: "#selector-list > .selector-item:first-child"
  - name: Match attribute selector
    action: assert_visible
    selector: "[tooltip=Inspect]"
  - name: Match data attribute selector
    action: assert_visible
    selector: "[data-role=primary]"
  - name: Match type selector property
    action: assert_property
    selector: "Button"
    property: "tooltip"
    expected: "Inspect"
  - name: Click inspect button
    action: click
    selector: "#inspect-button"
  - name: Assert ready text
    action: assert_text
    selector: "#selector-status"
    expected: "Inspect ready"
