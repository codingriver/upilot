name: "43-custom-sort"
description: Covers ColumnSortingMode.Custom for MultiColumnListView via sort_column action.
fixture:
  host_window:
    type: UnityUIFlow.Examples.ExampleCoverageCollectionsWindow
    reopen_if_open: true
steps:
  - name: Sort with custom mode descending
    action: sort_column
    selector: "#planet-list"
    column: "planet"
    direction: "descending"
    mode: "custom"
  - name: Wait for callback
    action: wait
    duration: "100ms"
  - name: Assert custom sort callback fired
    action: assert_text_contains
    selector: "#collection-status"
    expected: "CustomSort: planet:Descending"
