name: "08-press-key"
description: Covers the press_key action.
fixture:
  host_window:
    type: UnityUIFlow.Examples.ExamplePressKeyWindow
    reopen_if_open: true
steps:
  - name: Press A
    action: press_key
    key: "A"
  - name: Assert key text
    action: assert_text
    selector: "#key-status"
    expected: "Key: A"
