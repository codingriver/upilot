name: UnityUIFlow Sample

on:
  workflow_dispatch:

jobs:
  editmode-uiflow:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run UnityUIFlow
        shell: pwsh
        run: |
          $unity = "C:\Program Files\Unity\Hub\Editor\6000.6.0a2\Editor\Unity.exe"
          & $unity `
            -projectPath $PWD `
            -quit `
            -executeMethod UnityUIFlow.UnityUIFlowCliEntry.RunAllFromCommandLine `
            -unityUIFlow.headed false `
            -unityUIFlow.reportPath ./Reports `
            -unityUIFlow.screenshotOnFailure true `
            -unityUIFlow.testFilter *

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: unity-uiflow-reports
          path: Reports
