name: UIFlow Sample

on:
  workflow_dispatch:

jobs:
  editmode-uiflow:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run UIFlow
        shell: pwsh
        run: |
          $unity = "C:\Program Files\Unity\Hub\Editor\6000.6.0a2\Editor\Unity.exe"
          & $unity `
            -projectPath $PWD `
            -quit `
            -executeMethod codingriver.upilot.UIFlow.UIFlowCliEntry.RunAllFromCommandLine `
            -uiFlow.headed false `
            -uiFlow.reportPath ./Reports `
            -uiFlow.screenshotOnFailure true `
            -uiFlow.testFilter *

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: uiflow-reports
          path: Reports
